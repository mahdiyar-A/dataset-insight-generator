<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" ry="18" fill="#0f172a" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Bar chart bars -->
  <rect x="12" y="62" width="12" height="22" rx="3" fill="#2563eb"/>
  <rect x="28" y="50" width="12" height="34" rx="3" fill="#2563eb"/>
  <rect x="44" y="38" width="12" height="46" rx="3" fill="#2563eb"/>

  <!-- Lightbulb circle -->
  <circle cx="72" cy="36" r="14" fill="none" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Lightbulb filament lines -->
  <line x1="66" y1="46" x2="78" y2="46" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="51" x2="76" y2="51" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Lightbulb stem -->
  <line x1="72" y1="54" x2="72" y2="58" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
</svg>
